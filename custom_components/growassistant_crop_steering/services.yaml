reset_cycle:
  name: Reset cycle
  description: >-
    Reset daily/cycle state helpers for the configured GrowAssistant crop
    steering entry without touching the pump switch.

start_p1:
  name: Start P1
  description: >-
    Prepare P1 state helpers and backdate the last-shot helper so existing
    Home Assistant automation logic can allow the first P1 shot. This service
    does not turn on the pump.

stop_pump:
  name: Stop pump
  description: >-
    Turn off only the configured pump switch as an explicit manual/safety stop.
