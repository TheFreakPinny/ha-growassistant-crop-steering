views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading_style: title
          - type: markdown
            content: >-
              # GrowAssistant – Crop Steering

              Hallo {{ user }}


              Übersicht, Diagnose und Einstellungen für dein
              Crop-Steering-System.
          - type: entities
            title: Steuerung
            entities:
              - entity: button.growassistant_crop_steering_zyklus_zurucksetzen
              - entity: button.growassistant_crop_steering_p1_starten
              - entity: button.growassistant_crop_steering_pumpe_stoppen
              - entity: button.growassistant_crop_steering_letzten_shot_auf_jetzt_setzen
              - entity: button.growassistant_crop_steering_letzten_shot_loschen
          - type: markdown
            content: >-
              Hinweis: Button-Entity-IDs können je nach
              Home-Assistant-Sprache und Entity Registry abweichen. Prüfe bei
              Bedarf die Entity-IDs auf der GrowAssistant-Geräteseite.
          - type: heading
            heading_style: subtitle
            heading: Phasen & Diagnose
          - type: markdown
            content: >-
              ## Aktuelle Phase


              **Phase:** `{{ states('sensor.growassistant_crop_steering_phase')
              | upper }}`


              **Blockierungsgrund:**

              `{{ states('sensor.growassistant_crop_steering_blockierungsgrund')
              }}`


              **Letzter Shot:**

              `{{ states('sensor.growassistant_crop_steering_letzter_shot') }}`
          - type: entities
            title: Soak Status
            entities:
              - entity: sensor.growassistant_crop_steering_verbleibender_p1_soak
                name: P1 Soak Restzeit
              - entity: sensor.growassistant_crop_steering_verbleibender_p2_soak
                name: P2 Soak Restzeit
          - type: entities
            title: P1 / P2 Status
            entities:
              - entity: switch.growassistant_crop_steering_p1_aktiv
                name: P1 aktiv
              - entity: switch.growassistant_crop_steering_p1_erledigt
                name: P1 erledigt
              - entity: switch.growassistant_crop_steering_p1_fenster_heute_geoffnet
                name: P1 Fenster heute geöffnet
              - entity: number.growassistant_crop_steering_p1_shots_erledigt
                name: P1 Shots erledigt
              - entity: number.growassistant_crop_steering_p2_shots_erledigt
                name: P2 Shots erledigt
          - type: heading
            heading_style: subtitle
            heading: P0 / P1 Einstellungen
          - type: entities
            title: P0 - Transpiration
            entities:
              - entity: number.growassistant_crop_steering_p0_transpiration
                name: Dauer P0
          - type: entities
            title: 'P1 Morning '
            entities:
              - entity: number.growassistant_crop_steering_p1_start_vwc
                name: P1 Start VWC
              - entity: number.growassistant_crop_steering_p1_shots
                name: Max Shots P1
              - entity: number.growassistant_crop_steering_p1_shot_duration
                name: Shot-Dauer P1
              - entity: number.growassistant_crop_steering_p1_soak
                name: P1 Soak
              - entity: number.growassistant_crop_steering_p1_duration
                name: Dauer P1
              - entity: number.growassistant_crop_steering_p1_interval
                name: Intervall P1
              - entity: number.growassistant_crop_steering_field_capacity_vwc
                name: Field Capacity VWC
          - type: heading
            heading_style: subtitle
            heading: P2 Einstellungen
          - type: entities
            title: 'P2 Midday '
            entities:
              - entity: number.growassistant_crop_steering_p2_vwc_drop
                name: P2 VWC Drop
              - entity: number.growassistant_crop_steering_p2_reference_vwc
                name: P2 Referenz VWC
              - entity: number.growassistant_crop_steering_p2_shots
                name: P2 Shots
              - entity: number.growassistant_crop_steering_p2_shot_duration
                name: Shot Dauer P2
              - entity: number.growassistant_crop_steering_p2_soak
                name: P2 Soak
              - entity: number.growassistant_crop_steering_p2_end_offset
                name: P2 End-Offset
              - entity: number.growassistant_crop_steering_p2_interval
                name: Intervall P2
          - type: entities
            entities:
              - entity: number.growassistant_crop_steering_vwc_cap
                name: VWC Obergrenze
              - entity: number.growassistant_crop_steering_vwc_hysteresis
                name: VWC Hysterese
            title: VWC Begrenzung
          - type: markdown
            content: >-
              ## Sicherheit


              Diese Integration enthält aktuell keine native Python-Shot-Engine.


              Pumpensteuerung erfolgt nur über den optionalen Blueprint oder
              eigene Home-Assistant-Automationen.


              Verwende für echte Pumpen immer eine physische/elektrische
              Failsafe-Lösung.
